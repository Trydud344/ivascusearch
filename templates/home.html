<!DOCTYPE html>
<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            OmniSearch
        </title>
        <link rel="stylesheet" href="static/main.css">
        <link rel="search" 
        type="application/opensearchdescription+xml" 
        title="OmniSearch" href="/opensearch.xml">
    </head>
    
    <body>
        <div class="view-home">
            <div class="container">
                <h1 class="hero-logo">
                    Omni<span>Search</span>
                </h1>
                <form action="/search" class="home-search-form">
                    <div class="search-input-wrapper">
                        <input name="q" type="text" class="search-box" placeholder="Search the web..."
                        autofocus autocomplete="off">
                    </div>
                    <div class="buttons">
                        <button type="submit" class="btn-primary">
                            Search
                        </button>
                        <a target="_blank" href="https://bwaaa.monster/donate">
                            <button type="button" class="btn-secondary">
                                Donate
                            </button>
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </body>

</html>
